# CodeRabbit configuration
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
  tools:
    markdownlint:
      enabled: true
    ruff:
      enabled: false
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
chat:
  auto_reply: true
